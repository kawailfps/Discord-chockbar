<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Discord Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1e1f22; color: white; font-family: sans-serif; }
        .discord-scrollbar::-webkit-scrollbar { width: 8px; }
        .discord-scrollbar::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <nav class="w-18 bg-[#1e1f22] flex flex-col items-center py-3 gap-3 border-r border-black/20">
        <div class="w-12 h-12 bg-[#5865f2] rounded-3xl hover:rounded-2xl transition-all flex items-center justify-center cursor-pointer group">
            <i class="fab fa-discord text-2xl"></i>
        </div>
        <div class="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
        <div id="serverList" class="flex flex-col gap-2">
            <div class="w-12 h-12 bg-[#313338] rounded-3xl hover:rounded-2xl transition-all cursor-pointer overflow-hidden">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=1" alt="S1">
            </div>
        </div>
        <button onclick="alert('Créer un serveur')" class="w-12 h-12 bg-[#313338] hover:bg-[#23a559] text-[#23a559] hover:text-white rounded-3xl hover:rounded-2xl transition-all flex items-center justify-center">
            <i class="fas fa-plus"></i>
        </button>
    </nav>

    <aside class="w-60 bg-[#2b2d31] flex flex-col">
        <div class="h-12 border-b border-black/20 flex items-center px-4 font-bold shadow-sm">Mon Serveur</div>
        <div class="flex-1 p-2 space-y-1 discord-scrollbar overflow-y-auto">
            <div class="flex items-center gap-2 text-gray-400 hover:bg-[#35363c] hover:text-white p-2 rounded cursor-pointer">
                <i class="fas fa-hashtag"></i> <span>général</span>
            </div>
        </div>
        <div class="bg-[#232428] p-2 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img id="userPfp" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-8 h-8 rounded-full bg-gray-600">
                <div class="text-xs">
                    <div id="userNameDisplay" class="font-bold">Utilisateur</div>
                    <div class="text-gray-400">#0001</div>
                </div>
            </div>
            <i onclick="openModal()" class="fas fa-gear text-gray-400 hover:text-white cursor-pointer p-1"></i>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#313338]">
        <header class="h-12 border-b border-black/20 flex items-center px-4 font-bold gap-2">
            <i class="fas fa-hashtag text-gray-400"></i> général
        </header>
        <div id="chatBox" class="flex-1 p-4 overflow-y-auto discord-scrollbar space-y-4">
            <div class="flex gap-4">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex-shrink-0"></div>
                <div>
                    <span class="font-bold text-white hover:underline cursor-pointer">Système</span>
                    <span class="text-[10px] text-gray-400 ml-2">Aujourd'hui à 12:00</span>
                    <p class="text-gray-300">Bienvenue sur ton clone ! Clique sur la roue dentée pour modifier ton profil.</p>
                </div>
            </div>
        </div>
        <div class="p-4">
            <input type="text" placeholder="Envoyer un message dans #général" class="w-full bg-[#383a40] p-3 rounded-lg outline-none text-gray-200">
        </div>
    </main>

    <div id="profileModal" class="modal items-center justify-center">
        <div class="bg-[#313338] w-[500px] rounded-lg overflow-hidden shadow-2xl relative">
            <div id="bannerPreview" class="h-24 bg-indigo-600 w-full bg-cover bg-center"></div>
            <div class="px-6 pb-6 -mt-8 relative">
                <img id="pfpPreview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-20 h-20 rounded-full border-8 border-[#313338] bg-gray-500">
                <div class="mt-4 space-y-4">
                    <h2 class="text-xl font-bold">Modifier le profil</h2>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Nom d'utilisateur</label>
                        <input id="usernameInput" type="text" class="w-full bg-[#1e1f22] p-2 rounded mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Lien Photo de Profil (URL)</label>
                        <input id="pfpInput" type="text" class="w-full bg-[#1e1f22] p-2 rounded mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Lien Bannière (URL)</label>
                        <input id="bannerInput" type="text" class="w-full bg-[#1e1f22] p-2 rounded mt-1 outline-none">
                    </div>
                    <div class="flex justify-end gap-3 mt-4">
                        <button onclick="closeModal()" class="text-sm hover:underline">Annuler</button>
                        <button onclick="saveProfile()" class="bg-[#5865f2] hover:bg-[#4752c4] px-4 py-2 rounded font-bold">Enregistrer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('profileModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('profileModal').style.display = 'none'; }
        
        function saveProfile() {
            const name = document.getElementById('usernameInput').value;
            const pfp = document.getElementById('pfpInput').value;
            const banner = document.getElementById('bannerInput').value;

            if(name) document.getElementById('userNameDisplay').innerText = name;
            if(pfp) {
                document.getElementById('userPfp').src = pfp;
                document.getElementById('pfpPreview').src = pfp;
            }
            if(banner) document.getElementById('bannerPreview').style.backgroundImage = `url(${banner})`;
            
            closeModal();
        }
    </script>
</body>
</html>
